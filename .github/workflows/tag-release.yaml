name: Tag and Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g., 0.2.12). Must match sdk/pyproject.toml.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate version matches pyproject.toml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PYPROJECT_VERSION=$(grep '^version = ' sdk/pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          if [ "$VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch: input=$VERSION, pyproject.toml=$PYPROJECT_VERSION"
            echo "::error::Make sure the release PR was merged before tagging."
            exit 1
          fi

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git "$TAG"

          echo "Created and pushed tag: $TAG"
          echo "The 'Release and Publish' workflow will now build, publish to PyPI, and create the GitHub release."
