name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.9 or 0.3.0rc1)'
        required: true
        type: string

jobs:
  create-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+([a-zA-Z]+[0-9]+)?$"; then
            echo "::error::Invalid version format. Use: X.Y.Z or X.Y.Zrc1"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check for pre-release
        run: |
          if echo "$VERSION" | grep -qE "(rc|alpha|beta)[0-9]+$"; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Validate changelog has unreleased changes
        if: env.IS_PRERELEASE == 'false'
        run: |
          UNRELEASED=$(sed -n '/## \[Unreleased\]/,/## \[/p' sdk/CHANGELOG.md | sed '1d;$d')
          if ! echo "$UNRELEASED" | grep -qE "^### "; then
            echo "::error::No changes found under [Unreleased] in sdk/CHANGELOG.md"
            exit 1
          fi

      - name: Create release branch and update version
        run: |
          git config user.name "eggai-release-bot[bot]"
          git config user.email "eggai-release-bot[bot]@users.noreply.github.com"
          git checkout -b release/v$VERSION

          sed -i 's/^version = ".*"/version = "'$VERSION'"/' sdk/pyproject.toml

          ACTUAL=$(grep '^version = ' sdk/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "::error::Failed to update version in sdk/pyproject.toml (got: $ACTUAL)"
            exit 1
          fi

          if [ "$IS_PRERELEASE" = "false" ]; then
            DATE=$(date +%Y-%m-%d)
            sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" sdk/CHANGELOG.md
          fi

          git add sdk/pyproject.toml sdk/CHANGELOG.md
          git commit -m "chore: release v$VERSION"

      - name: Extract changelog
        id: changelog
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "CONTENT=Pre-release version $VERSION" >> $GITHUB_OUTPUT
          else
            CONTENT=$(sed -n "/## \[$VERSION\]/,/## \[/p" sdk/CHANGELOG.md | tail -n +2 | head -n -1)
            DELIMITER=$(openssl rand -hex 8)
            echo "CONTENT<<${DELIMITER}" >> $GITHUB_OUTPUT
            echo "$CONTENT" >> $GITHUB_OUTPUT
            echo "${DELIMITER}" >> $GITHUB_OUTPUT
          fi

      - name: Push and create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.CONTENT }}
        run: |
          git push origin release/v$VERSION

          if [ "$IS_PRERELEASE" = "true" ]; then
            printf '%s\n' "Pre-release v$VERSION for testing." "" "Install with: \`pip install eggai==$VERSION\`" > /tmp/pr-body.md
            LABELS="--label release --label skip-changelog"
          else
            printf '%s\n' "## Release v$VERSION" "" "$CHANGELOG_BODY" "" "---" "After merging, the release will be automatically tagged and published to PyPI." > /tmp/pr-body.md
            LABELS="--label release"
          fi

          gh pr create \
            --title "chore: release v$VERSION" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head release/v$VERSION \
            $LABELS
